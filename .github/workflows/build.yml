# Build Jker-OS live ISO with mkarchiso on GitHub-hosted runners.
# Uses a privileged Arch Linux container so chroot/mount operations work
# on the runner's local filesystem instead of shared/network drives.

name: Build Jker-OS ISO

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jker-os-iso-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: mkarchiso build
    runs-on: ubuntu-latest
    timeout-minutes: 180

    container:
      image: archlinux:latest
      options: --privileged -v /dev:/dev

    env:
      WORK_DIR: /tmp/jker-work
      OUT_DIR: /tmp/jker-out

    steps:
      - name: Restore pacman package cache
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: pacman-${{ runner.os }}-${{ hashFiles('packages.x86_64', 'packages.both', 'bootstrap_packages') }}
          restore-keys: |
            pacman-${{ runner.os }}-

      - name: Initialize pacman and install archiso
        run: |
          set -euo pipefail
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed archiso curl wget

      - name: Checkout jker-os profile
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare profile scripts and assets
        run: |
          set -euo pipefail
          chmod +x profiledef.sh customize_airootfs.sh download_assets.sh

          ASSET_DIR="airootfs/usr/share/jker-os/assets"
          GRUB_AIROOTFS="airootfs/usr/share/grub/themes/jker-grub"
          GRUB_ISO="grub/themes/jker-grub"

          if [[ -s "${ASSET_DIR}/jker-live-wall.mp4" && -s "${ASSET_DIR}/jker-desktop-bg.png" ]]; then
            echo "Bundled assets found; skipping download_assets.sh"
            mkdir -p "${GRUB_AIROOTFS}" "${GRUB_ISO}"
            cp "${ASSET_DIR}/jker-desktop-bg.png" "${GRUB_AIROOTFS}/background.png"
            cp "${ASSET_DIR}/jker-desktop-bg.png" "${GRUB_ISO}/background.png"
          else
            bash download_assets.sh
          fi

      - name: Build ISO with mkarchiso
        run: |
          set -euo pipefail
          rm -rf "${WORK_DIR}" "${OUT_DIR}"
          mkdir -p "${WORK_DIR}" "${OUT_DIR}"

          echo "==> Starting mkarchiso (profile: ${GITHUB_WORKSPACE})"
          # Removed manual work_dir copy commands that were corrupting EFI stub generations
          mkarchiso -v -w "${WORK_DIR}" -o "${OUT_DIR}" "${GITHUB_WORKSPACE}"

          ISO_PATH="$(find "${OUT_DIR}" -maxdepth 1 -type f -name '*.iso' | sort | head -n 1)"
          if [[ -z "${ISO_PATH}" ]]; then
            echo "ERROR: mkarchiso did not produce an ISO in ${OUT_DIR}" >&2
            ls -la "${OUT_DIR}" || true
            exit 1
          fi

          cp "${ISO_PATH}" "${OUT_DIR}/jker-os.iso"
          ls -lh "${OUT_DIR}/jker-os.iso"

      - name: Fast Push to Continuous Rolling Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling-build
          name: "Jker-OS Continuous Rolling Build"
          draft: false
          prerelease: true
          files: /tmp/jker-out/jker-os.iso
