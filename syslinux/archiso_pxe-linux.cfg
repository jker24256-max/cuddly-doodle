DEFAULT archiso_sys-linux.cfg
LABEL jkeros
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G copytoram=n module_blacklist=pcspkr nouveau.modeset=1 radeon.modeset=1 nvme_load=yes
