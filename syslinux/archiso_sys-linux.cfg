UI menu.c32
MENU TITLE Jker OS Boot Menu
MENU BACKGROUND splash.png
MENU COLOR border       0 #FF0055 #000000
MENU COLOR title        1 #8A2BE2 #000000
MENU COLOR unsel        7 #FF0055 #000000
MENU COLOR hotsel       1 #39FF14 #8A2BE2
MENU COLOR sel          7 #8A2BE2 #FF0055
MENU COLOR disabled     0 #643282 #000000
MENU COLOR scrollbar    0 #39FF14 #000000
MENU COLOR tabmsg       0 #FF0055 #000000
MENU COLOR timeout_msg  0 #39FF14 #000000
MENU COLOR timeout      1 #8A2BE2 #000000
MENU COLOR msg07        0 #FF0055 #000000
MENU COLOR help         0 #39FF14 #000000
MENU WIDTH 78
MENU MARGIN 4
MENU ROWS 7
MENU VSHIFT 8
MENU TABMSGROW 14
MENU CMDLINEROW 14
MENU HELPMSGROW 16
MENU HELPMSGENDROW 29
MENU PASSWORDROW 30
MENU TIMEOUTROW 30
TIMEOUT 300

LABEL jkeros
MENU LABEL Jker OS live medium (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G copytoram=n module_blacklist=pcspkr nouveau.modeset=1 radeon.modeset=1 nvme_load=yes

LABEL jkeros-access
MENU LABEL Jker OS live medium (%ARCH%, BIOS) with speakup screen reader
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G copytoram=n module_blacklist=pcspkr nouveau.modeset=1 radeon.modeset=1 nvme_load=yes accessibility=on

LABEL memtest
MENU LABEL Run Memtest86+ (%ARCH%)
LINUX /%INSTALL_DIR%/boot/%ARCH%/memtest
TEXT HELP
Run Memtest86+ to test system memory.
ENDTEXT

LABEL reboot
MENU LABEL Reboot
COM32 reboot.c32

LABEL poweroff
MENU LABEL Power off
COM32 poweroff.c32
