# Jker-OS GRUB loopback configuration
insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod ntfs
insmod ntfscomp
insmod exfat
insmod udf

insmod gfxterm
insmod gfxmenu
insmod png
terminal_output gfxterm

menuentry "Jker OS live medium (%ARCH%)" --class arch --class gnu-linux --class gnu --class os --id 'jkeros' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G copytoram=n module_blacklist=pcspkr nouveau.modeset=1 radeon.modeset=1 nvme_load=yes
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}
