# Jker-OS GRUB configuration for ISO boot
# Theme: jker-grub (Spider-Verse / Joker / Iron Man / Cyberpunk)

# Load partition table and filesystem modules
insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod ntfs
insmod ntfscomp
insmod exfat
insmod udf

if [ "${grub_platform}" == "efi" ]; then
    if [ "${grub_cpu}" == "x86_64" ]; then
        set root='(cd0)'
    elif [ "${grub_cpu}" == "i386" ]; then
        set root='(cd0)'
    fi
else
    set root='(cd)'
fi

# Load Jker-OS custom theme
insmod gfxterm
insmod gfxmenu
insmod png
terminal_output gfxterm
export theme="/boot/grub/themes/jker-grub/theme.txt"
if [ -f ${prefix}/themes/jker-grub/theme.txt ]; then
    set theme=${prefix}/themes/jker-grub/theme.txt
fi

if [ "${grub_platform}" == "efi" ]; then
    menuentry "Jker OS live medium (%ARCH%, UEFI)" --class arch --class gnu-linux --class gnu --class os --id 'jkeros' {
        set gfxpayload=keep
        linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G copytoram=n module_blacklist=pcspkr nouveau.modeset=1 radeon.modeset=1 nvme_load=yes
        initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
    }
    menuentry "Jker OS live medium (%ARCH%, UEFI) with speakup screen reader" --hotkey 's' --class arch --class gnu-linux --class gnu --class os --id 'jkeros-access' {
        set gfxpayload=keep
        linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G copytoram=n module_blacklist=pcspkr nouveau.modeset=1 radeon.modeset=1 nvme_load=yes accessibility=on
        initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
    }
else
    menuentry "Jker OS live medium (%ARCH%, BIOS)" --class arch --class gnu-linux --class gnu --class os --id 'jkeros' {
        set gfxpayload=keep
        linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G copytoram=n module_blacklist=pcspkr nouveau.modeset=1 radeon.modeset=1 nvme_load=yes
        initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
    }
    menuentry "Jker OS live medium (%ARCH%, BIOS) with speakup screen reader" --hotkey 's' --class arch --class gnu-linux --class gnu --class os --id 'jkeros-access' {
        set gfxpayload=keep
        linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G copytoram=n module_blacklist=pcspkr nouveau.modeset=1 radeon.modeset=1 nvme_load=yes accessibility=on
        initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
    }
fi

if [ "${grub_platform}" == "efi" ]; then
    menuentry "UEFI Firmware Settings" --id 'uefi-firmware' {
        fwsetup
    }
fi

menuentry "System shutdown" --class shutdown --class poweroff {
    halt
}

menuentry "System restart" --class reboot --class restart {
    reboot
}
